<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏒 Florbal Stats</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    color:white;
    text-align:center;
}
.card {
    background:white;
    color:#333;
    margin:20px;
    padding:20px;
    border-radius:12px;
}
table { width:100%; }
td, th { padding:8px; }
.plus { background:green; color:white; }
</style>
</head>

<body>

<h1>🏒 Florbal Stats</h1>

<div id="login">
    <button onclick="login()">Přihlásit přes Google</button>
</div>

<div id="app" style="display:none;">

<div class="card">
    <input type="date" id="date" onchange="loadDay()">
</div>

<div class="card">
    <h3>Docházka</h3>
    <table id="attendance"></table>
</div>

<div class="card">
    <h3>Góly</h3>
    <table id="goals"></table>
</div>

</div>

<script>

// Firebase config OK
const firebaseConfig = {
  apiKey: "AIzaSyCSFxJuzRvPOrATyuYpwQWyjLgHow3LXAI",
  authDomain: "florbal-cf3a3.firebaseapp.com",
  projectId: "florbal-cf3a3",
  storageBucket: "florbal-cf3a3.firebasestorage.app",
  messagingSenderId: "931228433806",
  appId: "1:931228433806:web:f837c3e0c11ae747e778df"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const names = ["jmeno1","jmeno2","jmeno3","jmeno4","jmeno5"];

// LOGIN
function login(){
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

// PO LOGINU
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
    }
});

// ===== LOAD DAY =====
async function loadDay(){
    const date = document.getElementById("date").value;
    if(!date) return;

    const ref = db.collection("matches").doc(date);
    const doc = await ref.get();

    const data = doc.exists ? doc.data() : {};

    renderAttendance(data);
    renderGoals(data);
}

// ===== DOCHÁZKA =====
function renderAttendance(data){
    let html = "<tr><th>Hráč</th><th>Přišel</th></tr>";

    names.forEach(n=>{
        const p = data[n] || {played:false};

        html += `
        <tr>
            <td>${n}</td>
            <td>
                <input type="checkbox" ${p.played ? "checked":""}
                onchange="togglePlayed('${n}')">
            </td>
        </tr>`;
    });

    document.getElementById("attendance").innerHTML = html;
}

// ===== GÓLY =====
function renderGoals(data){
    let html = "<tr><th>Hráč</th><th>Góly</th><th></th></tr>";

    names.forEach(n=>{
        const p = data[n];

        if(p && p.played){
            html += `
            <tr>
                <td>${n}</td>
                <td>${p.goals || 0}</td>
                <td><button class="plus" onclick="addGoal('${n}')">+1</button></td>
            </tr>`;
        }
    });

    document.getElementById("goals").innerHTML = html;
}

// ===== TOGGLE DOCHÁZKY =====
async function togglePlayed(name){
    const date = document.getElementById("date").value;
    if(!date) return alert("Vyber datum");

    const ref = db.collection("matches").doc(date);
    const doc = await ref.get();

    const data = doc.exists ? doc.data() : {};
    const current = data[name] || {goals:0, played:false};

    await ref.set({
        {
            goals: current.goals,
            played: !current.played
        }
    }, { merge:true });

    loadDay(); // 🔥 DŮLEŽITÉ
}

// ===== GÓLY =====
async function addGoal(name){
    const date = document.getElementById("date").value;
    if(!date) return;

    const ref = db.collection("matches").doc(date);
    const doc = await ref.get();

    const data = doc.exists ? doc.data() : {};
    const current = data[name] || {goals:0, played:true};

    await ref.set({
        {
            goals: current.goals + 1,
            played: true
        }
    }, { merge:true });

    loadDay(); // 🔥 DŮLEŽITÉ
}

</script>

</body>
</html>
