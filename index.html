<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florbal Stats</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#1e3c47; color:white; text-align:center;}
.card { background:white; color:black; margin:15px; padding:15px; border-radius:10px;}
table { width:100%; }
td,th { padding:8px; }
button { padding:5px 10px; }
</style>
</head>

<body>

<h1>🏒 Florbal Stats</h1>
<h2>verze 1.0</h2>
<div id="login">
    <button onclick="login()">Přihlásit přes Google</button>
</div>

<div id="app" style="display:none;">

<div class="card">
    <input type="date" id="date" onchange="loadDay()">
</div>

<div class="card">
    <h3>Docházka</h3>
    <table id="attendance"></table>
</div>

<div class="card">
    <h3>Góly</h3>
    <table id="goals"></table>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCSFxJuzRvPOrATyuYpwQWyjLgHow3LXAI",
  authDomain: "florbal-cf3a3.firebaseapp.com",
  projectId: "florbal-cf3a3",
  storageBucket: "florbal-cf3a3.firebasestorage.app",
  messagingSenderId: "931228433806",
  appId: "1:931228433806:web:f837c3e0c11ae747e778df"
};


firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const names = ["jmeno1","jmeno2","jmeno3","jmeno4","jmeno5"];

// LOGIN
function login(){
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";

        // ✅ nastav dnešní datum + načti data
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("date").value = today;

        loadDay();
    }
});

// LOAD
async function loadDay(){
    const date = document.getElementById("date").value;
    if(!date) return;

    const doc = await db.collection("matches").doc(date).get();
    const data = doc.exists ? doc.data() : {};

    renderAttendance(data);
    renderGoals(data);
}

// DOCHÁZKA
function renderAttendance(data){
    console.log("RENDER attendance fired");

    let html = "<tr><th>Hráč</th><th>Přišel</th></tr>";

    for (let i = 0; i < names.length; i++) {
        html += "<tr><td>" + names[i] + "</td><td><input type='checkbox'></td></tr>";
    }

    document.getElementById("attendance").innerHTML = html;
}

// GÓLY
function renderGoals(data){
    const table = document.getElementById("goals");
    if(!table){
        console.error("goals table not found");
        return;
    }

    let html = "<tr><th>Hráč</th><th>Góly</th><th></th></tr>";

    names.forEach(n=>{
        const p = data[n];

        if(p && p.played){
            html += `
            <tr>
                <td>${n}</td>
                <td>${p.goals || 0}</td>
                <td><button onclick="addGoal('${n}')">+1</button></td>
            </tr>`;
        }
    });

    table.innerHTML = html;
}

// TOGGLE
async function togglePlayed(name){
    const date = document.getElementById("date").value;
    if(!date) return;

    const ref = db.collection("matches").doc(date);
    const doc = await ref.get();

    const data = doc.exists ? doc.data() : {};
    const current = data[name] || {goals:0, played:false};

    await ref.set({
        [name]: {
            goals: current.goals,
            played: !current.played
        }
    }, { merge:true });

    loadDay();
}

// GÓL
async function addGoal(name){
    const date = document.getElementById("date").value;
    if(!date) return;

    const ref = db.collection("matches").doc(date);
    const doc = await ref.get();

    const data = doc.exists ? doc.data() : {};
    const current = data[name] || {goals:0, played:true};

    await ref.set({
        [name]: {
            goals: current.goals + 1,
            played: true
        }
    }, { merge:true });

    loadDay();
}

</script>

</body>
</html>
