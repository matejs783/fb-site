<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florbal Stats</title>
<link rel="icon" href="https://banner2.cleanpng.com/20180719/qfl/d143316127b975cd8a274f9698e32d03.webp" type="image/png">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#1e3c47; color:white; text-align:center;}
.card { background:white; color:black; margin:15px; padding:15px; border-radius:10px;}
table { width:100%; }
td,th { padding:8px; }
button { padding:5px 10px; }
</style>
</head>

<body>

<h1>🏒 Florbal Stats</h1>
<h2>verze 1.9</h2>
<div id="login">
    <button onclick="login()">Přihlásit přes Google</button>
</div>

<div id="app" style="display:none;">

<div class="card">
    <input type="date" id="date" onchange="loadDay()">
</div>

<div class="card">
    <h3>📄 Docházka 📄</h3>
    <table id="attendance"></table>
</div>

<div class="card">
    <h3>🥅 Góly 🥅</h3>
    <table id="goals"></table>
</div>
<div class="card">
    <h3>🏆 Leaderboard docházky 🏆</h3>
    <select id="yearSelect" onchange="loadLeaderboard()">
        <option value="2026">2026</option>
        <option value="2027">2027</option>
    </select>
    <table id="leaderboard"></table>
</div>

<div class="card">
    <h3>📈 Graf gólů 📈</h3>
    <select id="playerSelect" onchange="drawChart()"></select>
    <canvas id="chart" width="400" height="200"></canvas>
</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSFxJuzRvPOrATyuYpwQWyjLgHow3LXAI",
  authDomain: "florbal-cf3a3.firebaseapp.com",
  projectId: "florbal-cf3a3",
  storageBucket: "florbal-cf3a3.firebasestorage.app",
  messagingSenderId: "931228433806",
  appId: "1:931228433806:web:f837c3e0c11ae747e778df"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const names = ["Dan Mikeš","Dan Hakulín","Radim Hladík","Michal Špinka","Jakub Myšák","Vojta Lakomý","Tonda Lakomý","Matěj Svobodník","Jonáš Březina","Dan Horyna","Tim Poláček","Adam Hošek"];

// LOGIN
function login(){
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";

        // ✅ nastav dnešní datum + načti data
       const today = new Date().toLocaleDateString('en-CA');
        document.getElementById("date").value = today;
        initPlayers();
        loadLeaderboard();
        loadDay();
        drawChart();
    }
});

// LOAD
async function loadDay(){
    const date = document.getElementById("date").value;
    if(!date) return;

    const doc = await db.collection("matches").doc(date).get();
    const data = doc.exists ? doc.data() : {};

    renderAttendance(data);
    renderGoals(data);
}

// DOCHÁZKA
function renderAttendance(data){
    const table = document.getElementById("attendance");

    let html = "<tr><th>Hráč</th><th>Přišel</th></tr>";

    names.forEach(name => {
        const p = data[name] || { goals: 0, played: false };

        html += `
        <tr>
            <td>${name}</td>
            <td>
                <input type="checkbox"
                    ${p.played ? "checked" : ""}
                    onchange="togglePlayed('${name}')">
            </td>
        </tr>`;
    });

    table.innerHTML = html;
}


// GÓLY
function renderGoals(data){
    const table = document.getElementById("goals");

    let html = "<tr><th>Hráč</th><th>Góly</th><th></th></tr>";

    names.forEach(name => {
        const p = data[name];

        if (p && p.played) {
            html += `
            <tr>
                <td>${name}</td>
                <td>${p.goals || 0}</td>
<td>
    <button style="background:green;color:white;" onclick="addGoal('${name}')">+1</button>
    <button style="background:red;color:white;" onclick="removeGoal('${name}')">-1</button>
</td>
            </tr>`;
        }
    });

    table.innerHTML = html;
}

// TOGGLE
async function togglePlayed(name){
    const date = document.getElementById("date").value;
    if(!date) return;

    const ref = db.collection("matches").doc(date);
    const doc = await ref.get();

    const data = doc.exists ? doc.data() : {};
    const current = data[name] || {goals:0, played:false};

    await ref.set({
        [name]: {
            goals: current.goals,
            played: !current.played
        }
    }, { merge:true });

    loadDay();
}

// GÓL
async function addGoal(name){
    const date = document.getElementById("date").value;
    if(!date) return;

    const ref = db.collection("matches").doc(date);
    const doc = await ref.get();

    const data = doc.exists ? doc.data() : {};
    
    // Načteme stará data hráče, nebo vytvoříme základní strukturu
    const current = data[name] || { goals: 0, played: true };

    // Uložíme data POD JMÉNEM HRÁČE s využitím [name]
    await ref.set({
        [name]: {
            goals: current.goals + 1,
            played: true
        }
    }, { merge: true });

    loadDay();
}
//minus gol
async function removeGoal(name){
    const date = document.getElementById("date").value;
    if(!date) return;

    const ref = db.collection("matches").doc(date);
    const doc = await ref.get();

    const data = doc.exists ? doc.data() : {};
    const current = data[name] || { goals: 0, played: true };

    const newGoals = Math.max(0, current.goals - 1);

    await ref.set({
        {
            goals: newGoals,
            played: true
        }
    }, { merge: true });

    loadDay();
}
// pro dropdown hracu
function initPlayers(){
    const sel = document.getElementById("playerSelect");
    sel.innerHTML = names.map(n => `<option>${n}</option>`).join("");
}    
    //leaderboard
    async function loadLeaderboard(){
    const year = document.getElementById("yearSelect").value;
    const snapshot = await db.collection("matches").get();

    const stats = {};
    names.forEach(n => stats[n] = 0);

    snapshot.forEach(doc => {
        if(doc.id.startsWith(year)){
            const data = doc.data();

            names.forEach(n => {
                if(data[n]?.played){
                    stats[n]++;
                }
            });
        }
    });

    let html = "<tr><th>Hráč</th><th>Docházka</th></tr>";

    Object.entries(stats)
        .sort((a,b) => b[1] - a[1])
        .forEach(([name,val]) => {
            html += `<tr><td>${name}</td><td>${val}</td></tr>`;
        });

    document.getElementById("leaderboard").innerHTML = html;
}
    //graf
    async function drawChart(){
    const player = document.getElementById("playerSelect").value;
    const snapshot = await db.collection("matches").get();

    const values = [];

    snapshot.forEach(doc => {
        const data = doc.data();
        if(data[player]?.played){
            values.push(data[player].goals || 0);
        }
    });

    const ctx = document.getElementById("chart").getContext("2d");
    ctx.clearRect(0, 0, 400, 200);

    values.forEach((v, i) => {
        ctx.fillStyle = "green";
        ctx.fillRect(i * 40, 200 - v * 10, 20, v * 10);
    });
}
</script>

</body>
</html>
