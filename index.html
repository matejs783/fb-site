<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏒 Florbal Stats</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    color:white;
    text-align:center;
}
.card {
    background:white;
    color:#333;
    margin:20px;
    padding:20px;
    border-radius:12px;
}
table {
    width:100%;
}
td {
    padding:8px;
}
button { padding:5px 10px; }
.plus { background:green; color:white; }
</style>
</head>

<body>

<h1>🏒 Florbal Stats</h1>

<div id="login">
    <button onclick="login()">Přihlásit přes Google</button>
</div>

<div id="app" style="display:none;">

<div class="card">
    <input type="date" id="date" onchange="loadDay()">
</div>

<div class="card">
    <h3>Docházka</h3>
    <table id="attendance"></table>
</div>

<div class="card">
    <h3>Góly</h3>
    <table id="goals"></table>
</div>

<div class="card">
    <h3>Leaderboard</h3>
    <div id="leaderboard"></div>
</div>

<div class="card">
    <h3>Graf hráče</h3>
    <select id="playerSelect" onchange="renderChart()"></select>
    <canvas id="chart"></canvas>
</div>

</div>

<script>

// 🔴 DOPLŇ
const firebaseConfig = {
  apiKey: "AIzaSyCSFxJuzRvPOrATyuYpwQWyjLgHow3LXAI",
  authDomain: "florbal-cf3a3.firebaseapp.com",
  projectId: "florbal-cf3a3",
  storageBucket: "florbal-cf3a3.firebasestorage.app",
  messagingSenderId: "931228433806",
  appId: "1:931228433806:web:f837c3e0c11ae747e778df"
};


firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const names = ["jmeno1","jmeno2","jmeno3","jmeno4","jmeno5"];

// LOGIN
function login(){
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        renderEmptyTables();
        loadLeaderboard();
    }
});

// ===== RENDER EMPTY TABLES =====
function renderEmptyTables(){
    renderAttendance({});
    renderGoals({});
}

// ===== LOAD DAY =====
async function loadDay(){
    const date = document.getElementById("date").value;
    if(!date) return;

    const doc = await db.collection("matches").doc(date).get();
    const data = doc.exists ? doc.data() : {};

    renderAttendance(data);
    renderGoals(data);
}

// ===== DOCHÁZKA =====
function renderAttendance(data){
    let html = "<tr><th>Hráč</th><th>Přišel</th></tr>";

    names.forEach(n=>{
        const p = data[n] || {played:false};

        html += `
        <tr>
            <td>${n}</td>
            <td>
                <input type="checkbox" ${p.played ? "checked":""}
                onchange="togglePlayed('${n}')">
            </td>
        </tr>`;
    });

    document.getElementById("attendance").innerHTML = html;
}

// ===== GÓLY =====
function renderGoals(data){
    let html = "<tr><th>Hráč</th><th>Góly</th><th>Akce</th></tr>";

    names.forEach(n=>{
        const p = data[n] || {goals:0};

        html += `
        <tr>
            <td>${n}</td>
            <td>${p.goals || 0}</td>
            <td>
                <button class="plus" onclick="addGoal('${n}')">+1</button>
            </td>
        </tr>`;
    });

    document.getElementById("goals").innerHTML = html;
}

// ===== SAVE PLAYER =====
async function savePlayer(name, newData){
    const date = document.getElementById("date").value;
    if(!date) return alert("Vyber datum");

    const ref = db.collection("matches").doc(date);

    await ref.set({
        [name]: newData
    }, { merge:true });

    loadDay();
    loadLeaderboard();
}

// ===== TOGGLE =====
async function togglePlayed(name){
    const date = document.getElementById("date").value;
    const doc = await db.collection("matches").doc(date).get();

    const current = doc.data()?.[name] || {goals:0, played:false};

    savePlayer(name, {
        goals: current.goals,
        played: !current.played
    });
}

// ===== GOALS =====
async function addGoal(name){
    const date = document.getElementById("date").value;
    const doc = await db.collection("matches").doc(date).get();

    const current = doc.data()?.[name] || {goals:0, played:true};

    savePlayer(name, {
        goals: current.goals + 1,
        played: true
    });
}

// ===== LEADERBOARD =====
async function loadLeaderboard(){
    const snapshot = await db.collection("matches").get();

    let totals = {};
    let matches = {};

    names.forEach(n=>{
        totals[n]=0;
        matches[n]=0;
    });

    snapshot.forEach(doc=>{
        const d = doc.data();

        names.forEach(n=>{
            const p = d[n];
            if(p?.played){
                matches[n]++;
                totals[n]+=p.goals || 0;
            }
        });
    });

    let sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);

    let html="";
    sorted.forEach(([n,v])=>{
        let avg = matches[n] ? (v/matches[n]).toFixed(2) : 0;
        html += `${n}: ${v} gólů | průměr ${avg}<br>`;
    });

    document.getElementById("leaderboard").innerHTML = html;

    const select = document.getElementById("playerSelect");
    select.innerHTML="";
    sorted.forEach(([n])=>{
        select.innerHTML+=`<option>${n}</option>`;
    });
}

// ===== GRAF =====
let chart;

async function renderChart(){
    const player = document.getElementById("playerSelect").value;
    const snapshot = await db.collection("matches").get();

    let labels=[];
    let values=[];

    snapshot.forEach(doc=>{
        labels.push(doc.id);
        values.push(doc.data()[player]?.goals || 0);
    });

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type:"line",
        data:{
            labels:labels,
            datasets:[{
                label:player,
                data:values
            }]
        }
    });
}

</script>

</body>
</html>
